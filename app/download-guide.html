
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- =========================== -->
    <!-- SECTION 1: PAGE TITLE & META -->
    <!-- =========================== -->
    <title>AIM™ Bootcamp | Structured AI Mastery Roadmap</title>
    
    <style>

        /* =========================== -->
        <!-- SECTION 9: PAGE-SPECIFIC STYLES -->
        <!-- =========================== */
        
        /* Add your page-specific CSS below */
        .pdf-viewer-section {
            background: var(--box-color);
            padding: 2rem;
            border-radius: 12px; /* Consistent border-radius */
            border: 1px solid var(--mirage-color);
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease-out forwards; /* Staggered animation */
            animation-delay: 0.2s;
            opacity: 0; /* Start hidden for animation */
            transform: translateY(20px); /* Start lower for animation */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .pdf-viewer-section:hover {
            transform: translateY(-5px); /* Lifting effect on hover */
            box-shadow: 0 0 20px rgba(255, 80, 17, 0.4); /* Glow effect */
        }

        .pdf-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pdf-header h2 {
            color: var(--title-color);
            font-size: 1.8rem;
            position: relative;
            padding-left: 1.5rem; /* Space for border accent */
        }

        .pdf-header h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 80%;
            background-color: var(--skin-color); /* Orange-red accent */
            border-radius: 2px;
        }

        .download-btn {
            background: linear-gradient(90deg, var(--skin-color), #d43a00);
            color: var(--title-color);
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 4px rgba(255, 80, 17, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 80, 17, 0.5);
            color: var(--title-color); /* Ensure text color remains white on hover */
        }

        .pdf-container {
            width: 100%;
            height: calc(100vh - 250px); /* Adjusted height to account for header, nav, and footer */
            min-height: 500px; /* Minimum height for better mobile experience */
            border: 1px solid var(--mirage-color);
            border-radius: 0.75rem;
            overflow: hidden; /* Ensures PDF content stays within rounded corners */
            box-shadow: var(--shadow);
        }

        .pdf-container embed {
            display: block; /* Remove extra space below embed */
        }

        /* Mobile responsiveness for PDF viewer */
        @media screen and (max-width: 768px) {
            .pdf-viewer-section {
                padding: 1.5rem;
            }

            .pdf-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                margin-bottom: 1rem;
            }

            .pdf-header h2 {
                font-size: 1.5rem;
                padding-left: 1.2rem;
            }

            .download-btn {
                width: 100%;
                justify-content: center;
                padding: 0.6rem 1rem;
                font-size: 1rem;
            }

            .pdf-container {
                height: calc(100vh - 200px); /* Further adjusted for mobile */
                min-height: 400px;
            }
        }




    </style>

</head>
<body>

    
    <!-- =========================== -->
    <!-- SECTION 12: MAIN CONTENT AREA -->

    <main>
        <section class="pdf-viewer-section">
            <div class="pdf-header">
                <h2>PDF Viewer: Sentinel</h2>
                <a href="/resources/aim-syllabus.pdf" download class="download-btn">
                    <i class="fa-solid fa-download"></i> Download PDF
                </a>
            </div>
            
            <div class="pdf-container">
                <embed src="/resources/sentinel-guide.pdf" width="100%" height="100%" type="application/pdf">
            </div>
        </section>
    </main>



<!-- Widget BACK-TO-TOP -->
<script>
// Create Back-to-Top Button Dynamically
document.addEventListener("DOMContentLoaded", function () {
    // Create the button container
    const backToTop = document.createElement("div");
    backToTop.id = "back-to-top";
    backToTop.style.position = "fixed";
    backToTop.style.bottom = "20px";
    backToTop.style.right = "20px";
    backToTop.style.display = "none";
    backToTop.style.cursor = "pointer";
    backToTop.style.zIndex = "9999";

    // Create the image inside the button
    const backToTopImg = document.createElement("img");
    backToTopImg.src = "https://bucket.mlcdn.com/a/3336/3336910/images/972c5065cffe83955d5322557dcdce28eca170e5.png";
    backToTopImg.alt = "Volver arriba";
    backToTopImg.style.width = "40px";
    backToTopImg.style.height = "40px";

    // Append image to the button
    backToTop.appendChild(backToTopImg);

    // Append button to the body
    document.body.appendChild(backToTop);

    // Scroll Event Listener
    window.addEventListener("scroll", function () {
        if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
            backToTop.style.display = "block";
        } else {
            backToTop.style.display = "none";
        }
    });

    // Click Event for Scrolling to Top
    backToTop.addEventListener("click", function () {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });
});
</script>
<!-- End Widget BACK-TO-TOP -->


 
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Navigation Dropdown Logic (Desktop/Mobile Submenu) ---
            const coursesLink = document.getElementById('courses-link');
            const submenu = document.getElementById('courses-submenu');
            const navBar = document.getElementById('nav-bar');

            if (coursesLink && submenu && navBar) {
                // Toggle visibility on click
                coursesLink.addEventListener('click', (e) => {
                    e.preventDefault(); 
                    const isMobile = window.innerWidth <= 980; // UPDATED Check
                    
                    if (isMobile) {
                        // For mobile, just toggle the submenu
                        submenu.classList.toggle('active');
                    } else {
                        // For desktop, toggle and manage hover-like behavior
                        submenu.classList.toggle('active');
                    }
                    
                    e.stopPropagation(); 
                });

                // Close menu when clicking outside
                document.addEventListener('click', (e) => {
                    if (!navBar.contains(e.target)) {
                        submenu.classList.remove('active');
                    }
                });

                // Prevent clicks inside submenu from closing it
                submenu.addEventListener('click', (e) => {
                    e.stopPropagation();
                });
            }

            // --- Mobile Menu Toggle Logic (Hamburger Icon) ---
            const mobileToggle = document.getElementById('mobile-menu-toggle');
            const navMenu = document.getElementById('nav-menu');
            const toggleIcon = document.getElementById('toggle-icon');

            if (mobileToggle && navMenu && toggleIcon) {
                mobileToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    navMenu.classList.toggle('mobile-open');
                    
                    if (navMenu.classList.contains('mobile-open')) {
                        toggleIcon.classList.remove('fa-bars');
                        toggleIcon.classList.add('fa-xmark');
                        document.body.style.overflow = 'hidden';
                    } else {
                        toggleIcon.classList.remove('fa-xmark');
                        toggleIcon.classList.add('fa-bars');
                        document.body.style.overflow = 'auto';
                        if (submenu) submenu.classList.remove('active');
                    }
                });
                
                // Close mobile menu when clicking links
                navMenu.querySelectorAll('.nav-link, .nav-cta').forEach(link => {
                    link.addEventListener('click', () => {
                        if (window.innerWidth <= 980) { // UPDATED Check
                            // Don't close menu if clicking the "Courses" toggle or a submenu link
                            if (!link.classList.contains('submenu-link') && link.id !== 'courses-link') {
                                navMenu.classList.remove('mobile-open');
                                toggleIcon.classList.remove('fa-xmark');
                                toggleIcon.classList.add('fa-bars');
                                document.body.style.overflow = 'auto';
                            }
                        }
                    });
                });
                
                // Close menu when clicking outside on mobile
                document.addEventListener('click', (e) => {
                    if (window.innerWidth <= 980 && // UPDATED Check
                        navMenu.classList.contains('mobile-open') &&
                        !navMenu.contains(e.target) && 
                        e.target !== mobileToggle) {
                        navMenu.classList.remove('mobile-open');
                        toggleIcon.classList.remove('fa-xmark');
                        toggleIcon.classList.add('fa-bars');
                        document.body.style.overflow = 'auto';
                        if (submenu) submenu.classList.remove('active');
                    }
                });
            }


            // Handle window resize
            window.addEventListener('resize', function() {
                const isMobile = window.innerWidth <= 980; // UPDATED Check
                
                if (!isMobile && navMenu && navMenu.classList.contains('mobile-open')) {
                    // If resizing to desktop and mobile menu is open, close it
                    navMenu.classList.remove('mobile-open');
                    if (toggleIcon) {
                        toggleIcon.classList.remove('fa-xmark');
                        toggleIcon.classList.add('fa-bars');
                    }
                    document.body.style.overflow = 'auto';
                }
                
                // Always close submenu on resize
                if (submenu) {
                    submenu.classList.remove('active');
                }
            });
            
            // =========================== -->
            <!-- SECTION 16: PAGE-SPECIFIC JAVASCRIPT -->
            <!-- =========================== */
            
            // Add your page-specific JavaScript here
            
        });
    </script>
